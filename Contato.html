<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
</head>
    <style>
        
     body {
       margin: 0;
       padding: 0;
    }

     .topo-unico {
       background-color: gray;
       width: 100%;              
       height: 100%;             
       color: black;             
       display: flex;
       justify-content: center;  
       align-items: center;       
    }
        .Bloco-de-MSG{
            display: flex;
            justify-content: center;  
        }

    </style>
<body>
    <header class="topo-unico">
    <h1><p style="text-align: center;">Contato</p></h1>
    </header>

  <div style="text-align: center;"><p><b>Nome:</b></p>
    <input style="text-align: center;" type="text" placeholder="Nome" minlength="5" maxlength="25" required>
</div>

    <div style="text-align: center;"><p><b>E-mail:</b></p>
    <input style="text-align: center;" type="text" placeholder="E-mail" minlength="5" maxlength="40" required>
</div>

    <div style="text-align: center;"><p><b>Mensagem:</b></p></div>

    <div class="Bloco-de-MSG">
        <textarea></textarea>
    </div>
    
</body>
</html>
